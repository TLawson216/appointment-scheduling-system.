<!DOCTYPE html>
<html>
<head>
    <title>Schedule</title>
</head>
<body>

<h2>Appointments</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Date</th>
        <th>Time</th>
    </tr>

    {% for appt in appointments %}
    <tr>
        <td>{{ appt[0] }}</td>
        <td>{{ appt[1] }}</td>
        <td>{{ appt[2] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
