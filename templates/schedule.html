<!DOCTYPE html>
<html>
<head>
    <title>Schedule</title>
</head>
<body>

<h2>Appointments</h2>

<table border="1">
<tr>
    <th>Name</th>
    <th>Date</th>
    <th>Time</th>
    <th>Action</th>
</tr>

{% for appt in appointments %}
<tr>
    <td>{{ appt[1] }}</td>
    <td>{{ appt[2] }}</td>
    <td>{{ appt[3] }}</td>

    <td>
        <form method="POST" action="/delete/{{ appt[0] }}">
    <button type="submit" onclick="return confirm('Are you sure you want to delete this appointment?')">
        Delete
    </button>
</form>
    </td>
</tr>
{% endfor %}

</table>

</body>
</html>
